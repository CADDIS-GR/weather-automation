name: Daily Stock Email

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 평일 KST 07:00 (UTC 22:00)
  workflow_dispatch:

jobs:
  send-stock-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install finance-datareader pytz

      - name: Send stock email
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          STOCK_CODES: ${{ secrets.STOCK_CODES }}
          AVG_PRICE_277630: ${{ secrets.AVG_PRICE_277630 }}
          AVG_PRICE_396500: ${{ secrets.AVG_PRICE_396500 }}
        run: python send_stock_email.py
