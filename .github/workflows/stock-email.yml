import FinanceDataReader as fdr
import smtplib
from email.mime.text import MIMEText
from email.mime.multipart import MIMEMultipart
import os
from datetime import datetime, timedelta
import pytz

KST = pytz.timezone('Asia/Seoul')
today = datetime.now(KST)

days_back = 3 if today.weekday() == 0 else 1
target_date = today - timedelta(days=days_back)
date_str = target_date.strftime('%Y-%m-%d')
display_date = target_date.strftime('%Y년 %m월 %d일')

# 종목코드: 종목명 직접 지정
STOCK_NAMES = {
    '277630': 'TIGER KOSPI',
    '396500': 'TIGER Fn반도체TOP10',
}

stock_codes = os.environ['STOCK_CODES'].split(',')

rows = []
for code in stock_codes:
    code = code.strip()
    name = STOCK_NAMES.get(code, code)
    try:
        df = fdr.DataReader(code, date_str, date_str)
        if df.empty:
            rows.append(f"<tr><td>{name} ({code})</td><td colspan='2' style='text-align:center; color:#999'>데이터 없음</td></tr>")
            continue

        row = df.iloc[-1]
        close = int(row['Close'])
        change_pct = round(float(row['Change']) * 100, 2)

        if change_pct > 0:
            color = '#e74c3c'
            sign = '▲'
        elif change_pct < 0:
            color = '#3498db'
            sign = '▼'
        else:
            color = '#555'
            sign = '─'

        rows.append(f"""
        <tr>
          <td style="padding:10px 16px">{name}<br><span style="font-size:12px;color:#999">{code}</span></td>
          <td style="padding:10px 16px; text-align:right; font-weight:bold">{close:,}원</td>
          <td style="padding:10px 16px; text-align:right; color:{color}; font-weight:bold">{sign} {abs(change_pct):.2f}%</td>
        </tr>""")

    except Exception as e:
        rows.append(f"<tr><td>{name} ({code})</td><td colspan='2' style='color:red'>오류: {e}</td></tr>")

table_rows = '\n'.join(rows)

html = f"""
<html>
<body style="font-family: 'Apple SD Gothic Neo', sans-serif; background:#f5f5f5; padding:30px;">
  <div style="max-width:480px; margin:0 auto; background:white; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1)">
    <div style="background:#2c3e50; color:white; padding:20px 24px;">
      <h2 style="margin:0; font-size:18px;">📈 주가 알림</h2>
      <p style="margin:4px 0 0; font-size:13px; opacity:0.8">{display_date} 종가 기준</p>
    </div>
    <table style="width:100%; border-collapse:collapse;">
      <thead>
        <tr style="background:#ecf0f1; color:#555; font-size:13px;">
          <th style="padding:10px 16px; text-align:left">종목</th>
          <th style="padding:10px 16px; text-align:right">종가</th>
          <th style="padding:10px 16px; text-align:right">등락률</th>
        </tr>
      </thead>
      <tbody>
        {table_rows}
      </tbody>
    </table>
    <p style="font-size:11px; color:#bbb; text-align:center; padding:16px; margin:0">
      자동 발송 | CADDIS-GR weather-automation
    </p>
  </div>
</body>
</html>
"""

msg = MIMEMultipart('alternative')
msg['Subject'] = f'[주가] {display_date} 종가'
msg['From'] = os.environ['GMAIL_USER']
msg['To'] = os.environ['EMAIL_TO']
msg.attach(MIMEText(html, 'html'))

with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
    server.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
    server.sendmail(os.environ['GMAIL_USER'], os.environ['EMAIL_TO'], msg.as_string())

print(f"✅ 주가 이메일 발송 완료 ({display_date})")
